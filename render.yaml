services:
  - type: web
    name: menuai
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAILS
        value: bignetpix@gmail.com
      - key: NODE_ENV
        value: production
    disk:
      - name: menuai-data
        mountPath: /app/data
        sizeGB: 1